services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install -r backend/requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8765"
    ports:
      - "8765:8765"
  frontend-ui:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      VITE_API_URL: http://localhost:8765
    command: sh -c "npm install && npm run dev:ui"
    ports:
      - "5173:5173"
    depends_on:
      - backend
